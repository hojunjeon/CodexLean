name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e '.[test]'
      - name: Test
        run: pytest -q

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Build wheel
        run: |
          python -m pip install build
          python -m build --wheel
      - name: Install and inspect wheel
        run: |
          python -m venv .venv-check
          .venv-check/bin/python -m pip install dist/codexlean-*.whl
          .venv-check/bin/codexlean --version
          .venv-check/bin/codexlean benchmark --profiles safe --output /tmp/benchmark.json
